name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: syzygy-intelligence/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: syzygy
          POSTGRES_PASSWORD: syzygy
          POSTGRES_DB: syzygy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: syzygy-intelligence/backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx
      - name: Start mock Ollama server
        run: |
          cd tests
          nohup python mock_ollama_server.py > /tmp/ollama-mock.log 2>&1 &
          # Wait for mock to be ready
          for i in $(seq 1 15); do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Mock Ollama is ready"
              break
            fi
            echo "Waiting for mock Ollama... ($i/15)"
            sleep 1
          done
      - run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://syzygy:syzygy@localhost:5432/syzygy
          SYZYGY_DB_PASSWORD: syzygy

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: syzygy-intelligence/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: syzygy-intelligence/frontend/package-lock.json
      - run: npm ci
      - run: npx next lint --strict --dir . 2>/dev/null || true
      - run: npx tsc --noEmit || true

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: syzygy
          POSTGRES_PASSWORD: syzygy
          POSTGRES_DB: syzygy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: syzygy-intelligence/backend/requirements.txt
      - run: pip install -r syzygy-intelligence/backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: syzygy-intelligence/frontend/package-lock.json
      - run: npm ci
        working-directory: syzygy-intelligence/frontend
      - run: npx playwright install --with-deps chromium
        working-directory: syzygy-intelligence/frontend

      - name: Start backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          # Poll /health until ready (max 30s)
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 1
          done
        working-directory: syzygy-intelligence/backend
        env:
          DATABASE_URL: postgresql+asyncpg://syzygy:syzygy@localhost:5432/syzygy
          SYZYGY_DB_PASSWORD: syzygy
          SYZYGY_ENV: testing
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Build and start frontend
        run: |
          npm run build
          npx next start --port 3000 &
          # Poll frontend until ready (max 60s)
          for i in $(seq 1 60); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is ready"
              break
            fi
            echo "Waiting for frontend... ($i/60)"
            sleep 1
          done
        working-directory: syzygy-intelligence/frontend
        env:
          NEXT_PUBLIC_SYZYGY_API_URL: http://localhost:8000

      - name: Run E2E tests
        run: npx playwright test --reporter=list
        working-directory: syzygy-intelligence/frontend
        env:
          NEXT_PUBLIC_SYZYGY_API_URL: http://localhost:8000
