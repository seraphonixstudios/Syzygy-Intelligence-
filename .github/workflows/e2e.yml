name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: syzygy-intelligence/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: syzygy
          POSTGRES_PASSWORD: syzygy
          POSTGRES_DB: syzygy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: syzygy-intelligence/backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx
      - name: Start mock Ollama server
        run: |
          cd tests
          nohup python mock_ollama_server.py > /tmp/ollama-mock.log 2>&1 &
          for i in $(seq 1 15); do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Mock Ollama is ready"
              break
            fi
            echo "Waiting for mock Ollama... ($i/15)"
            sleep 1
          done
      - run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://syzygy:syzygy@localhost:5432/syzygy
          SYZYGY_DB_PASSWORD: syzygy

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: syzygy-intelligence/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: syzygy-intelligence/frontend/package-lock.json
      - run: npm ci
      - run: npx next lint --strict --dir . 2>/dev/null || true
      - run: npx tsc --noEmit || true

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: syzygy
          POSTGRES_PASSWORD: syzygy
          POSTGRES_DB: syzygy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: syzygy-intelligence/backend/requirements.txt
      - run: pip install -r syzygy-intelligence/backend/requirements.txt
        env:
          PIP_CACHE_DIR: ~/.cache/pip
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: syzygy-intelligence/frontend/package-lock.json
      - run: npm ci
        working-directory: syzygy-intelligence/frontend
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('syzygy-intelligence/frontend/package-lock.json') }}
      - run: npx playwright install --with-deps chromium
        working-directory: syzygy-intelligence/frontend
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Cache Next.js build
        id: nextjs-cache
        uses: actions/cache@v5
        with:
          path: syzygy-intelligence/frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('syzygy-intelligence/frontend/package-lock.json') }}

      - name: Start mock Ollama server
        run: |
          cd tests
          nohup python mock_ollama_server.py > /tmp/ollama-mock.log 2>&1 &
          for i in $(seq 1 15); do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Mock Ollama is ready"
              break
            fi
            echo "Waiting for mock Ollama... ($i/15)"
            sleep 1
          done
        working-directory: syzygy-intelligence/backend

      - name: Start backend
        run: |
          # Poll /health until ready (max 30s)
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 1
          done
        working-directory: syzygy-intelligence/backend
        env:
          DATABASE_URL: postgresql+asyncpg://syzygy:syzygy@localhost:5432/syzygy
          SYZYGY_DB_PASSWORD: syzygy
          SYZYGY_ENV: testing
          OLLAMA_BASE_URL: http://localhost:11434
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Build and start frontend
        run: |
          npm run build
          npx next start --port 3000 &
          # Poll frontend until ready (max 60s)
          for i in $(seq 1 60); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is ready"
              break
            fi
            echo "Waiting for frontend... ($i/60)"
            sleep 1
          done
        working-directory: syzygy-intelligence/frontend
        env:
          NEXT_PUBLIC_SYZYGY_API_URL: http://localhost:8000

      - name: Run E2E tests (shard ${{ matrix.shard }}/3)
        run: npx playwright test --reporter=list --shard=${{ matrix.shard }}/3
        working-directory: syzygy-intelligence/frontend
        env:
          NEXT_PUBLIC_SYZYGY_API_URL: http://localhost:8000
