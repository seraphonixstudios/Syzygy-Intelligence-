name: Bug Report
description: File a bug report to help us improve Syzygy
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is
      placeholder: When I run the consensus workflow with 4 agents, the synthesis step hangs indefinitely...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Copy and paste any relevant logs or error output
      render: shell

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      description: How are you running Syzygy?
      options:
        - Docker Compose
        - npm run dev (frontend) + uvicorn (backend)
        - Production build
    validations:
      required: true

  - type: input
    id: models
    attributes:
      label: LLM Models in use
      description: Which Ollama models are you using?
      placeholder: qwen3:8b, deepseek-r1:7b, etc.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I am running the latest version from main
          required: false
