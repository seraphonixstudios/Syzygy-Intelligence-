# Monitoring stack extension for Syzygy Intelligence
# Usage: docker-compose -f docker-compose.yml -f docker-compose.monitoring.yml up

services:
  # ─── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: syzygy-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - syzygy-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: syzygy-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - syzygy-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Alertmanager ──────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: syzygy-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - syzygy-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Jaeger (Optional: for distributed tracing) ───────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: syzygy-jaeger
    restart: unless-stopped
    ports:
      - "6831:6831/udp"
      - "16686:16686"
    environment:
      COLLECTOR_ZIPKIN_HTTP_PORT: 9411
    networks:
      - syzygy-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Postgres Exporter ─────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: syzygy-postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${SYZYGY_DB_USER:-syzygy}:${SYZYGY_DB_PASSWORD:-syzygy_secret}@postgres:5432/${SYZYGY_DB_NAME:-syzygy}?sslmode=disable"
    networks:
      - syzygy-net
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Redis Exporter ────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: syzygy-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis://redis:6379"
    networks:
      - syzygy-net
    depends_on:
      redis:
        condition: service_healthy

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  syzygy-net:
    driver: bridge
