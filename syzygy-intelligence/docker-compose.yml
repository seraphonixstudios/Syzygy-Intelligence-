x-shared: &shared
  networks:
    - syzygy-net

services:
  # ─── Database ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: syzygy-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${SYZYGY_DB_NAME:-syzygy}
      POSTGRES_USER: ${SYZYGY_DB_USER:-syzygy}
      POSTGRES_PASSWORD: ${SYZYGY_DB_PASSWORD:-syzygy_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    <<: *shared

  redis:
    image: redis:7-alpine
    container_name: syzygy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    <<: *shared

  neo4j:
    image: neo4j:5-community-ubi9
    container_name: syzygy-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${SYZYGY_NEO4J_USER:-neo4j}/${SYZYGY_NEO4J_PASSWORD:-syzygy_secret}
    volumes:
      - neo4jdata:/data
    <<: *shared

  # ─── Ollama ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: syzygy-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - C:/Users/User/.ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    <<: *shared

  # ─── Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: syzygy-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      SYZYGY_ENV: ${SYZYGY_ENV:-development}
      SYZYGY_DB_HOST: ${SYZYGY_DB_HOST_DOCKER:-postgres}
      SYZYGY_DB_PORT: ${SYZYGY_DB_PORT:-5432}
      SYZYGY_DB_NAME: ${SYZYGY_DB_NAME:-syzygy}
      SYZYGY_DB_USER: ${SYZYGY_DB_USER:-syzygy}
      SYZYGY_DB_PASSWORD: ${SYZYGY_DB_PASSWORD:-syzygy_secret}
      SYZYGY_REDIS_URL: ${SYZYGY_REDIS_URL_DOCKER:-redis://redis:6379/0}
      SYZYGY_NEO4J_URI: ${SYZYGY_NEO4J_URI_DOCKER:-bolt://neo4j:7687}
      SYZYGY_OLLAMA_BASE_URL: ${SYZYGY_OLLAMA_BASE_URL_DOCKER:-http://ollama:11434}
      SYZYGY_SECRET_KEY: ${SYZYGY_SECRET_KEY:-change-me-to-a-random-secret}
      SYZYGY_CORS_ORIGINS: ${SYZYGY_CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    volumes:
      - ./backend:/app
      - sandbox_data:/app/data/sandbox
      - chroma_data:/app/data/chroma
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    <<: *shared

  # ─── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: syzygy-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SYZYGY_API_URL: ${NEXT_PUBLIC_SYZYGY_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_SYZYGY_WS_URL: ${NEXT_PUBLIC_SYZYGY_WS_URL:-ws://localhost:8000/ws}
    depends_on:
      - backend
    volumes: []
    <<: *shared

  # ─── Sandbox Executor ──────────────────────────────────────
  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: syzygy-sandbox
    restart: unless-stopped
    environment:
      SANDBOX_TIMEOUT: ${SYZYGY_SANDBOX_TIMEOUT:-120}
      SANDBOX_MEMORY_LIMIT: ${SYZYGY_SANDBOX_MEMORY_LIMIT:-512m}
    volumes:
      - sandbox_data:/data
    <<: *shared

volumes:
  pgdata:
  neo4jdata:
  sandbox_data:
  chroma_data:

networks:
  syzygy-net:
    driver: bridge
