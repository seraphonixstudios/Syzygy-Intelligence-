# Local development override — uses native Ollama on host
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
services:
  backend:
    environment:
      SYZYGY_OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
