# Caddy reverse proxy for production HTTPS.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.caddy.yml up -d
services:
  caddy:
    image: caddy:2-alpine
    container_name: syzygy-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${SYZYGY_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
    networks:
      - syzygy-net

volumes:
  caddy_data:
  caddy_config:
