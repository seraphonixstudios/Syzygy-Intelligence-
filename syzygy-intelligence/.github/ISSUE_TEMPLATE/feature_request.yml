name: Feature Request
description: Suggest an idea for Syzygy Intelligence
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! We welcome all ideas that align with Syzygy's alchemical philosophy.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is
      placeholder: I'm always frustrated when [...]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen
      placeholder: A new workflow that allows [...]
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or workarounds?
      placeholder: I've tried [...]

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Syzygy does this affect?
      options:
        - Agent System
        - Consensus Engine
        - Workflow Engine
        - Frontend UI
        - API / Backend
        - Memory Layer
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or screenshots
