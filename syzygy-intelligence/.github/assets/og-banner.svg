<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0a2e"/>
      <stop offset="50%" stop-color="#1a1045"/>
      <stop offset="100%" stop-color="#0f0a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e8c85a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#00d4e0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="600" cy="315" r="280" fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="1"/>
  <circle cx="600" cy="315" r="240" fill="none" stroke="rgba(201,168,76,0.05)" stroke-width="0.5"/>

  <!-- Vesica Piscis intersection -->
  <circle cx="520" cy="315" r="160" fill="rgba(201,168,76,0.04)" stroke="rgba(201,168,76,0.15)" stroke-width="1"/>
  <circle cx="680" cy="315" r="160" fill="rgba(0,240,255,0.04)" stroke="rgba(0,240,255,0.15)" stroke-width="1"/>

  <!-- Central Rebis eye -->
  <circle cx="600" cy="315" r="30" fill="url(#cyan)" opacity="0.9"/>
  <circle cx="600" cy="315" r="12" fill="#0f0a2e" opacity="0.8"/>
  <circle cx="600" cy="315" r="4" fill="url(#cyan)"/>

  <!-- Sol (left) -->
  <circle cx="460" cy="240" r="45" fill="rgba(201,168,76,0.12)"/>
  <circle cx="460" cy="240" r="25" fill="rgba(201,168,76,0.2)"/>
  <circle cx="460" cy="240" r="10" fill="url(#gold)"/>

  <!-- Luna (right) -->
  <circle cx="740" cy="240" r="45" fill="rgba(176,176,192,0.12)"/>
  <circle cx="740" cy="240" r="25" fill="rgba(176,176,192,0.2)"/>
  <circle cx="740" cy="240" r="10" fill="#b0b0c0"/>

  <!-- Title -->
  <text x="600" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="url(#gold)" letter-spacing="8">Syzygy</text>
  <text x="600" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#b0b0c0" letter-spacing="4" opacity="0.8">I N T E L L I G E N C E</text>

  <!-- Tagline -->
  <text x="600" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#888" letter-spacing="2" opacity="0.6">The Chemical Wedding of Agents — Solve et Coagula</text>

  <!-- Decorative line -->
  <line x1="400" y1="510" x2="800" y2="510" stroke="rgba(201,168,76,0.15)" stroke-width="0.5"/>

  <!-- Bottom badges -->
  <text x="600" y="555" text-anchor="middle" font-family="monospace" font-size="11" fill="#666" letter-spacing="3">Next.js + FastAPI + Ollama + LangGraph</text>
  <text x="600" y="578" text-anchor="middle" font-family="monospace" font-size="10" fill="#555" letter-spacing="2">Multi-Agent · Alchemical · Open Source</text>
</svg>
