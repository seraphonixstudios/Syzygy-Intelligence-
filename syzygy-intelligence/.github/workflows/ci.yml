name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SYZYGY_API_URL: http://localhost:8000
  NEXT_PUBLIC_SYZYGY_WS_URL: ws://localhost:8000/ws

jobs:
  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --frozen-lockfile --prefer-offline
      - run: npm run lint

  backend-lint-and-test:
    name: Backend lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-timeout
      - name: Ruff check
        run: python -m ruff check .
        continue-on-error: true
      - name: Run tests
        run: python -m pytest tests/ -q --tb=short --timeout=60

  e2e:
    name: E2E tests (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: [frontend-lint, backend-lint-and-test]
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/3", "2/3", "3/3"]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend deps
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r ../backend/requirements.txt
          pip install httpx uvicorn

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci --frozen-lockfile --prefer-offline

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start backend
        run: |
          mkdir -p ../backend/data
          SYZYGY_ENV=development \
          SYZYGY_LOG_LEVEL=WARNING \
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 --log-level warning > /tmp/backend.log 2>&1 &
          echo "Backend PID: $!"
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
          done
        working-directory: backend

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SYZYGY_API_URL: ${{ env.NEXT_PUBLIC_SYZYGY_API_URL }}
          NEXT_PUBLIC_SYZYGY_WS_URL: ${{ env.NEXT_PUBLIC_SYZYGY_WS_URL }}

      - name: Start frontend
        run: |
          nohup node .next/standalone/server.js > /tmp/frontend.log 2>&1 &
          echo "Frontend PID: $!"
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:3000/ > /dev/null 2>&1; then
              echo "Frontend ready after ${i}s"
              break
            fi
            sleep 1
          done
        env:
          NODE_ENV: production
          PORT: 3000
          HOSTNAME: 127.0.0.1

      - name: Run Playwright tests
        run: npx playwright test --shard=${{ matrix.shard }} --reporter=list
        env:
          CI: "true"
          PLAYWRIGHT_HTML_REPORT: playwright-report-shard-${{ matrix.shard }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: frontend/playwright-report-shard-${{ matrix.shard }}/
          retention-days: 7
