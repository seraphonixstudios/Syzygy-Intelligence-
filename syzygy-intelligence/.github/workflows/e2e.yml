name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: syzygy-intelligence/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: syzygy
          POSTGRES_PASSWORD: syzygy
          POSTGRES_DB: syzygy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: syzygy-intelligence/backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx
      - run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://syzygy:syzygy@localhost:5432/syzygy

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: syzygy-intelligence/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: syzygy-intelligence/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: syzygy-intelligence
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: syzygy
          POSTGRES_PASSWORD: syzygy
          POSTGRES_DB: syzygy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: syzygy-intelligence/backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          DATABASE_URL: postgresql+asyncpg://syzygy:syzygy@localhost:5432/syzygy
          SYZYGY_ENV: testing
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Build and start frontend
        run: |
          npm run build
          npx next start --port 3000 &
          sleep 3
        working-directory: frontend
        env:
          NEXT_PUBLIC_SYZYGY_API_URL: http://localhost:8000

      - name: Run E2E tests
        run: npx playwright test --reporter=list
        working-directory: frontend
        env:
          NEXT_PUBLIC_SYZYGY_API_URL: http://localhost:8000
