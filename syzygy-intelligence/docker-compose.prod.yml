# Production overrides for syzygy-intelligence.
# Usage:
#   Basic:        docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   With HTTPS:   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.caddy.yml up -d
#   Build frontend with custom domain: docker compose build --build-arg NEXT_PUBLIC_SYZYGY_API_URL=https://api.example.com
#   See Caddyfile for TLS config, rate limiting, and security headers.
services:
  ollama:
    image: ollama/ollama:0.3.14
    deploy:
      resources:
        reservations:
          devices: []

  backend:
    volumes:
      - sandbox_data:/app/data/sandbox
      - chroma_data:/app/data/chroma
      - uploads_data:/app/data/uploads
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info"]
    environment:
      SYZYGY_ENV: production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SYZYGY_API_URL: ${NEXT_PUBLIC_SYZYGY_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_SYZYGY_WS_URL: ${NEXT_PUBLIC_SYZYGY_WS_URL:-ws://localhost:8000/ws}
    environment:
      NODE_ENV: production
